version: 1.0.0
# Devices Configuration for Guition JC1060P470 (JC-ESP32P4-M3-DEV)
#
# CHANGE LOG (revision 3 - HEADLESS / NO DISPLAY VARIANT)
#   - display_lcd and lcd_touch are commented out below.
#     With no MIPI-DSI panel physically connected, the JD9165 driver
#     hangs the CPU forever polling for a panel response that will
#     never arrive.  Disabling those two devices lets the rest of the
#     system (ES8311 audio, SDMMC, ESP-Hosted, WiFi) initialize and
#     reach the network stack.
#
#   To re-enable when a display is attached: uncomment the display_lcd
#   and lcd_touch blocks below and rebuild.

devices:
  # =====================================================================
  # Audio output: ES8311 codec (DAC path)
  # =====================================================================
  - name: audio_dac
    chip: es8311
    type: audio_codec
    version: default
    config:
      dac_enabled: true
      dac_max_channel: 1
      dac_channel_mask: "1"
      mclk_enabled: true

    peripherals:
      - name: gpio_pa_control
        gain: 6
        active_level: 1
      - name: i2s_audio_out
      - name: i2c_master
        address: 0x30
        frequency: 400000

  # =====================================================================
  # Audio input: ES8311 codec (ADC path - same chip as audio_dac)
  # =====================================================================
  - name: audio_adc
    chip: es8311
    type: audio_codec
    version: default
    config:
      adc_enabled: true
      adc_max_channel: 2
      adc_channel_mask: "11"
      adc_channel_labels: [RE, FC]
      mclk_enabled: true

    peripherals:
      - name: i2s_audio_in
      - name: i2c_master
        address: 0x30
        frequency: 400000

  # =====================================================================
  # microSD filesystem (FAT on SDMMC).
  # Benign if no card inserted - reports 0x107 and moves on.
  # =====================================================================
  - name: fs_sdcard
    type: fs_fat
    sub_type: sdmmc
    version: default
    config:
      sub_config:
        slot: SDMMC_HOST_SLOT_0
        frequency: SDMMC_FREQ_HIGHSPEED
        bus_width: 4
        pins:
          clk: 0
          cmd: 0
          d0: 0
          d1: 0
          d2: 0
          d3: 0
          d4: 0
          d5: 0
          d6: 0
          d7: 0
        ldo_chan_id: 4

  # =====================================================================
  # LCD backlight controller (LEDC-based).
  # Kept enabled - doesn't depend on the panel being present, and
  # leaves the option of dimming the (absent) backlight later harmless.
  # =====================================================================
  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    config:
      default_percent: 100
    peripherals:
      - name: ledc_backlight

  # ---------------------------------------------------------------------
  # DISPLAY AND TOUCH - DISABLED FOR HEADLESS BRING-UP
  # ---------------------------------------------------------------------
  # Re-enable both blocks below when a display ribbon is physically
  # connected to the JC1060P470 module.  See README.md for context.
  # ---------------------------------------------------------------------
