version: 1.0.0
# Peripherals Configuration for Guition JC1060P470 (JC-ESP32P4-M3-DEV)
#
# Pin values derived from pingcfg.h in
#   Deep-start9527/guition_product_demo (variant JC1060P470C_I_W_Y).
# Schema mirrors esp32_p4_function_ev (Espressif EV board with JD9165/EK79007
# MIPI-DSI + ES8311 audio) which is structurally the closest match in
# esp-claw's existing boards.

peripherals:
  # ---------------------------------------------------------------------
  # I2C bus 0 - shared by GT911 touch panel and ES8311 audio codec.
  # ---------------------------------------------------------------------
  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 7
        scl: 8

  # ---------------------------------------------------------------------
  # I2S full-duplex audio (ES8311 codec on both sides).
  # Note: vendor pingcfg.h labels pins from the codec's perspective; here
  # they are renamed to the ESP's perspective via dout (ESP -> codec) and
  # din (codec -> ESP). JC1060P470 routes the speaker path on GPIO 9 and
  # the microphone capture on GPIO 48.
  # ---------------------------------------------------------------------
  - name: i2s_audio_out
    type: i2s
    format: "std-out"
    role: master
    config: &i2s_config
      port: 0
      sample_rate_hz: 48000
      clk_src: "I2S_CLK_SRC_DEFAULT"
      mclk_multiple: 256
      data_bit_width: 16
      slot_mode: "I2S_SLOT_MODE_STEREO"
      slot_mask: "I2S_STD_SLOT_BOTH"
      ws_width: 16
      pins:
        mclk: 13
        bclk: 12
        ws:   10
        dout: 9
        din:  48

  - name: i2s_audio_in
    type: i2s
    format: "std-in"
    role: master
    config: *i2s_config

  # ---------------------------------------------------------------------
  # Audio PA enable line (drives the speaker amplifier).
  # pingcfg.h: AUDIO_PA_CTRL_PIN = GPIO_NUM_11
  # ---------------------------------------------------------------------
  - name: gpio_pa_control
    type: gpio
    role: io
    config:
      pin: 11
      mode: GPIO_MODE_OUTPUT
      pull_up: true
      default_level: 0

  # ---------------------------------------------------------------------
  # LDO for MIPI PHY power (2.5 V). Required before MIPI-DSI bus init.
  # Same channel as the ESP32-P4-Function-EV-Board.
  # ---------------------------------------------------------------------
  - name: ldo_mipi
    type: ldo
    config:
      chan_id: 3
      voltage_mv: 2500
      adjustable: 1
      owned_by_hw: 0

  # ---------------------------------------------------------------------
  # MIPI-DSI bus for the JD9165 panel (1024x600, 2 lanes).
  # Vendor lcd.c uses 750 Mbps for JC1060P470; we use that directly here
  # (function_ev's EK79007 uses 1000 Mbps - a different panel).
  # ---------------------------------------------------------------------
  - name: dsi_display
    type: dsi
    config:
      bus_id: 0
      data_lanes: 2
      phy_clk_src: 0
      lane_bit_rate_mbps: 750

  # ---------------------------------------------------------------------
  # LCD backlight via LEDC PWM. pingcfg.h: GPIO 23.
  # Channel 0, timer 1 (matches vendor lcd.c).
  # ---------------------------------------------------------------------
  - name: ledc_backlight
    type: ledc
    version: default
    config:
      gpio_num: 23
      speed_mode: LEDC_LOW_SPEED_MODE
      channel: 1
      timer_sel: 1
      duty: 0
